# ============================================
# 鑫钱包 · 复用已有 MariaDB 的部署（模式 B）
# 仅启动应用容器，连接你 NAS / 服务器上「已经存在的 MariaDB」
# （复用既有数据，不另起库实例）
#
# 用法：
#   docker compose -f docker-compose.external.yml up -d          # 默认拉取 GHCR 预构建镜像
#   docker compose -f docker-compose.external.yml up -d --build  # 从本地源码构建
#
# 数据库连接信息全部来自同目录 .env（DB_HOST / DB_PORT / DB_USER /
# DB_PASSWORD / DB_NAME）。请确保该账号具备建表/改表权限
# （CREATE DATABASE / CREATE TABLE / ALTER / INDEX）。
# ============================================

services:
  app:
    image: ghcr.io/zjx93/xin-wallet/xinwallet:latest
    build: .            # 仅在使用 --build 时生效；默认直接拉取上面的 image
    container_name: xinwallet-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 18888
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-xinwallet}
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret}
      DEMO_PASSWORD: ${DEMO_PASSWORD}
      CORS_ORIGIN: ${CORS_ORIGIN}
    ports:
      - "${APP_PORT:-18888}:18888"

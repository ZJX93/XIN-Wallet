# ============================================
# 鑫钱包 · 自动构建 Docker 镜像
# 触发条件：推送形如 vX.Y.Z 的 tag（如 v0.0.1）
# 行为：构建多架构镜像（amd64 + arm64），推送到 GitHub Container Registry
# 版本号：从 v0.0.1 开始
# ============================================
name: Build & Publish Docker Image

# 触发器：v*.*.* 形式的 tag 推送
on:
  push:
    tags:
      - 'v*.*.*'
  # 允许手动触发（用于测试）
  workflow_dispatch:
    inputs:
      tag:
        description: '手动构建的版本号（留空生成 dev-<sha>）'
        required: false
        default: ''

# 环境变量
env:
  REGISTRY: ghcr.io
  # 镜像名小写（OCI 规范要求），但仓库名可大写
  IMAGE_OWNER: ${{ github.repository_owner }}
  IMAGE_REPO: xin-wallet
  IMAGE_NAME: ${{ github.repository_owner }}/xin-wallet/xinwallet

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # 推送镜像到 GHCR 所需

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 计算镜像 tag
        id: meta
        run: |
          # 优先使用推送的 tag，否则用手动参数，否则用 main-<sha>
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG_NAME=${{ github.event.inputs.tag }}
          else
            TAG_NAME=dev-${GITHUB_SHA::7}
          fi
          echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "FULL_TAG=${REGISTRY}/${IMAGE_OWNER}/xin-wallet/xinwallet:${TAG_NAME}" >> $GITHUB_OUTPUT

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送多架构镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.TAG_NAME }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.title=XIN Wallet
            org.opencontainers.image.description=鑫钱包 - 个人财务助手
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 构建摘要
        if: success()
        run: |
          echo "✅ 镜像构建完成:"
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.TAG_NAME }}"
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo ""
          echo "📋 pull 命令:"
          echo "  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.TAG_NAME }}"

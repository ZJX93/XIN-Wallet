# ============================================
# 鑫钱包 · 自动构建 Docker 镜像
# 触发条件：推送形如 vX.Y.Z 的 tag（如 v0.0.1）
# 行为：构建多架构镜像（amd64 + arm64），推送到 GitHub Container Registry
# 版本号：从 v0.0.1 开始
# ============================================
name: Build & Publish Docker Image

# 同一分支/标签同一时间仅允许一个构建运行，避免堆积
concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: '手动构建的版本号'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  # 镜像名必须全小写。GitHub Actions 表达式不支持 lower()，改用 shell tr。
  IMAGE_REPO_LOWER: xin-wallet

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 一个 step 同时计算 tag + 转小写 owner，输出供后续步骤引用
      - name: 准备镜像配置
        id: setup
        run: |
          # 1) 计算 VERSION（推送的 tag / 手动参数 / dev-<sha>）
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION=${GITHUB_REF#refs/tags/}
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION=${{ github.event.inputs.tag }}
          else
            VERSION=dev-${GITHUB_SHA::7}
          fi
          # 2) owner 转小写（OCI 镜像名要求小写）
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_PATH="${OWNER_LOWER}/${IMAGE_REPO_LOWER}/xinwallet"
          FULL_TAG="${REGISTRY}/${IMAGE_PATH}:${VERSION}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "IMAGE_PATH=${IMAGE_PATH}" >> $GITHUB_OUTPUT
          echo "FULL_TAG=${FULL_TAG}" >> $GITHUB_OUTPUT
          echo "📦 ${FULL_TAG}"

      # 自动生成 ENCRYPTION_KEY（生产部署可覆盖：docker run -e ENCRYPTION_KEY=<your-key>）
      - name: 生成加密密钥
        id: genkey
        run: |
          KEY=$(openssl rand -hex 32)
          echo "key=${KEY}" >> $GITHUB_OUTPUT
          echo "🔐 已生成 ENCRYPTION_KEY（构建期内嵌于镜像）"
          echo "📌 注意：重新部署此镜像将生成新密钥，原已加密数据将无法解密"

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送多架构镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # 自动生成生产环境加密密钥（避免启动崩溃），用户应在生产部署时显式注入
          build-args: |
            ENCRYPTION_KEY=${{ steps.genkey.outputs.key }}
          tags: |
            ${{ steps.setup.outputs.FULL_TAG }}
            ${{ env.REGISTRY }}/${{ steps.setup.outputs.IMAGE_PATH }}:latest
          labels: |
            org.opencontainers.image.title=XIN Wallet
            org.opencontainers.image.description=鑫钱包 - 个人财务助手
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 构建摘要
        if: success()
        run: |
          echo "✅ 镜像构建完成:"
          echo "  ${{ steps.setup.outputs.FULL_TAG }}"
          echo "  ${{ env.REGISTRY }}/${{ steps.setup.outputs.IMAGE_PATH }}:latest"
          echo ""
          echo "📋 pull:"
          echo "  docker pull ${{ steps.setup.outputs.FULL_TAG }}"

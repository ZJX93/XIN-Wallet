            <section class="page" id="page-ai-recognition">
                <!-- OCR 上传 + 账单导入（双栏） -->
                <div class="ai-scan-top">
                    <div class="glass-card">
                        <h3 class="card-title">🖼️ 上传账单截图</h3>
                        <p class="card-desc">腾讯云 OCR 提取文字后由 AI 自动解析为交易记录</p>
                        <div class="ocr-upload-area" id="ocrUploadArea">
                            <input type="file" id="ocrImageInput" accept="image/*" style="display:none">
                            <div class="ocr-upload-placeholder" id="ocrUploadPlaceholder">
                                <div class="ocr-upload-icon">🖼️</div>
                                <p>点击或拖拽上传账单截图</p>
                                <p class="ocr-upload-hint">支持 JPG / PNG / WebP，不超过 5MB</p>
                            </div>
                            <img id="ocrPreview" class="ocr-preview" style="display:none" alt="预览">
                            <div class="ocr-upload-actions">
                                <button class="btn btn-primary btn-ai" id="ocrRecognizeBtn" disabled>🔍 识别并解析</button>
                                <button class="btn btn-ghost" id="ocrClearBtn">重新选择</button>
                            </div>
                        </div>
                    </div>
                    <div class="glass-card">
                        <h3 class="card-title">📥 账单导入（支付宝/微信）</h3>
                        <p class="card-desc">直接导入导出的账单文件，自动识别并匹配记账分类</p>
                        <div class="bill-upload-area" id="billUploadArea">
                            <input type="file" id="billFileInput" accept=".csv,.xls,.xlsx" style="display:none">
                            <div class="ocr-upload-placeholder" id="billUploadPlaceholder">
                                <div class="ocr-upload-icon">📊</div>
                                <p>点击或拖拽上传账单文件</p>
                                <p class="ocr-upload-hint">支持支付宝/微信导出的 CSV、XLS、XLSX</p>
                            </div>
                            <div class="bill-file-info" id="billFileInfo" style="display:none">
                                <div class="bill-file-name" id="billFileName"></div>
                                <div class="bill-file-meta" id="billFileMeta"></div>
                            </div>
                            <div class="ocr-upload-actions">
                                <button class="btn btn-primary btn-ai" id="billParseBtn" disabled>🔍 解析账单</button>
                                <button class="btn btn-ghost" id="billClearBtn">重新选择</button>
                            </div>
                        </div>
                        <div class="bill-format-tip">
                            <span>💡 支付宝：我的→账单→开具交易流水证明（Excel）；微信：服务→钱包→账单→下载账单（Excel）</span>
                        </div>
                    </div>
                </div>
                <!-- 识别结果 -->
                <div class="ai-results" id="aiResults" style="display:none">
                    <h4 class="ai-results-title">识别结果</h4>
                    <div class="ocr-text-preview" id="ocrTextPreview" style="display:none"></div>
                    <div id="aiResultsList"></div>
                    <div class="ai-results-actions"><button class="btn btn-primary" id="aiImportAllBtn">全部导入为交易</button></div>
                </div>
                <!-- OCR 加载 -->
                <div id="ocrLoading" style="display:none;text-align:center;padding:24px">
                    <div class="skeleton-wrap" data-skeleton="text"><div class="skeleton-line shimmer" style="width:60%"></div><div class="skeleton-line shimmer" style="width:72%"></div><div class="skeleton-line shimmer" style="width:84%"></div></div>
                    <p style="margin-top:8px;color:var(--text-tertiary)">正在识别并解析...</p>
                </div>
            </section>
